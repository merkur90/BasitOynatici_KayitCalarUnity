name: Build Android
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-restore-${{ github.sha }}
          restore-keys: |
            Library-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          unityVersion: 2018.4.36f1
          projectPath: .
          customParameters: >
            -buildTarget Android 
            -androidBuildSubtarget AppBundle 
            -keystoreName user.keystore 
            -keystorePass ${{ secrets.KEYSTORE_PASS }} 
            -keyaliasName ${{ secrets.KEY_ALIAS }} 
            -keyaliasPass ${{ secrets.KEY_ALIAS_PASS }}
            -androidTargetSdkVersion AndroidApiLevel35
            -androidSdkTarget 35